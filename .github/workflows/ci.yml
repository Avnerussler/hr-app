name: CI Pipeline

on:
 push:
  branches: [main]
 pull_request:
  branches: [main]

jobs:
 lint-and-build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Setup Node.js
     uses: actions/setup-node@v4
     with:
      node-version: '20.x'
      cache: 'npm'
      cache-dependency-path: package-lock.json

   - name: Install dependencies
     run: npm ci

   - name: Run frontend lint
     run: npm run lint --workspace=apps/frontend

   - name: Run frontend build
     run: npm run build --workspace=apps/frontend

   - name: Run server build
     run: npm run build --workspace=apps/server

   - name: Upload frontend build artifacts
     uses: actions/upload-artifact@v4
     with:
      name: frontend-build
      path: apps/frontend/dist

   - name: Upload server build artifacts
     uses: actions/upload-artifact@v4
     with:
      name: server-build
      path: apps/server/dist

 test:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Setup Node.js
     uses: actions/setup-node@v4
     with:
      node-version: '20.x'
      cache: 'npm'
      cache-dependency-path: package-lock.json

   - name: Install dependencies
     run: npm ci

   - name: Run server tests
     run: npm test --workspace=apps/server

 docker-build:
  runs-on: ubuntu-latest
  needs: [lint-and-build, test]

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3

   - name: Build frontend Docker image
     uses: docker/build-push-action@v5
     with:
      context: .
      file: ./apps/frontend/Dockerfile
      push: false
      tags: hr-frontend:${{ github.sha }}
      cache-from: type=gha
      cache-to: type=gha,mode=max

   - name: Build server Docker image
     uses: docker/build-push-action@v5
     with:
      context: .
      file: ./apps/server/Dockerfile
      push: false
      tags: hr-server:${{ github.sha }}
      cache-from: type=gha
      cache-to: type=gha,mode=max

 security-scan:
  runs-on: ubuntu-latest
  needs: lint-and-build

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Run npm audit for frontend
     run: |
      cd apps/frontend
      npm audit --audit-level moderate
     continue-on-error: true

   - name: Run npm audit for server
     run: |
      cd apps/server
      npm audit --audit-level moderate
     continue-on-error: true
