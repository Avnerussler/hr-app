version: '3'

tasks:
  frontend:
    desc: Run the frontend development server
    dir: apps/frontend
    cmd: npm run dev

  server:
    desc: Run the server development server
    dir: apps/server
    cmd: npm run dev

  docker:
    desc: Run the complete application with Docker Compose
    dir: apps/server
    cmd: npm run docker:compose

  docker:build:
    desc: Build Docker images for frontend and backend
    cmds:
      - task: docker:build:frontend
      - task: docker:build:server

  docker:build:frontend:
    desc: Build frontend Docker image
    dir: apps/frontend
    cmd: npm run docker:build

  docker:build:server:
    desc: Build server Docker image
    dir: apps/server
    cmd: npm run docker:build

  docker:ship:
    desc: Build linux/amd64 images for frontend and server and save them as tar archives
    cmd: npm run docker:ship

  install:
    desc: Install dependencies for both frontend and server
    cmds:
      - task: install:frontend
      - task: install:server

  install:frontend:
    desc: Install frontend dependencies
    dir: apps/frontend
    cmd: npm install

  install:server:
    desc: Install server dependencies
    dir: apps/server
    cmd: npm install

  build:
    desc: Build both frontend and server
    cmds:
      - task: build:frontend
      - task: build:server

  build:frontend:
    desc: Build frontend
    dir: apps/frontend
    cmd: npm run build

  build:server:
    desc: Build server
    dir: apps/server
    cmd: npm run build

  lint:
    desc: Run linting for frontend
    dir: apps/frontend
    cmd: npm run lint

  dev:
    desc: Run both frontend and server in development mode
    deps: [frontend, server]

  clean:
    desc: Clean build artifacts and node_modules
    cmds:
      - rm -rf apps/frontend/dist apps/frontend/node_modules
      - rm -rf apps/server/dist apps/server/node_modules

  docker:down:
    desc: Stop and remove Docker containers
    dir: apps/server
    cmd: docker compose -f 'docker/compose.yml' down

  docker:seed:settings:
    desc: Seed/reset default settings in the running Docker container (overwrites existing option edits)
    cmd: docker exec hr-server-app npm run --workspace=apps/server seed:settings:docker

  docker:seed:settings:dry-run:
    desc: Dry-run the settings seed against the running Docker container
    cmd: docker exec hr-server-app npm run --workspace=apps/server seed:settings:docker:dry-run

  test:
    desc: Run Playwright tests
    cmd: npm run test

  test:headed:
    desc: Run Playwright tests in headed mode
    cmd: npm run test:headed

  test:ui:
    desc: Run Playwright tests with UI
    cmd: npm run test:ui

  e2e:
    desc: Run end-to-end tests
    cmd: npm run e2e

  e2e:headed:
    desc: Run end-to-end tests in headed mode
    cmd: npm run e2e:headed